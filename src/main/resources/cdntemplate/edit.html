<!-- CDN over local code always | Alpine.js to reduce code | Styling matches https://www.baeldung.com/ | PicoCSS for layout/components | Mermaid.js to render all graphs | Only this comment should remain, always considered and never be changed -->
<!DOCTYPE html>
<html lang="en" x-data="{dk:false}" :data-theme="dk?'dark':'light'">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Editor – CDNWebTemplate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/grapesjs/0.21.7/css/grapes.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/grapesjs/0.21.7/grapes.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/grapesjs-preset-webpage/1.0.2/index.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap"/>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<style>
/* ── light tokens — exact match to template.html ── */
:root{
  --Y:#4CAF50;--K:#23282d;--r:6px;
  --page:#fff;--bg:#F5F7F8;--b:#E0E0E0;--text:#333;--muted:#666;
  --btn:#23282d;--btntxt:#ffffff;
  --bar:48px;--sans:'Open Sans',sans-serif;
}
[data-theme="dark"]{
  --page:#1a1a1a;--bg:#252525;--b:#383838;--text:#e0e0e0;--muted:#888;
  --btn:#4CAF50;--btntxt:#ffffff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column}

/* ── topbar — white/dark surface, yellow bottom border ── */
#topbar{
  height:var(--bar);background:var(--page);border-bottom:3px solid var(--Y);
  display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:200;
  box-shadow:0 1px 4px rgba(0,0,0,.08)}

.brand{font-size:13px;font-weight:800;letter-spacing:-.2px;color:var(--K);white-space:nowrap;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .brand{color:var(--Y)}
.brand-dot{width:18px;height:18px;background:var(--Y);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--K);flex-shrink:0}
.sep{width:1px;height:20px;background:var(--b);flex-shrink:0}
.spacer{flex:1}

.file-in{
  font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text);
  background:var(--bg);border:1px solid var(--b);border-radius:var(--r);
  padding:4px 10px;outline:none;width:172px;transition:border-color .15s}
.file-in:focus{border-color:var(--K)}

/* toggle groups */
.tog{display:flex;border:1px solid var(--b);border-radius:var(--r);overflow:hidden;background:var(--bg)}
.tog button{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.02em;padding:5px 11px;cursor:pointer;transition:all .12s}
.tog button.on{background:var(--K);color:#fff}
.tog button:hover:not(.on){background:var(--b);color:var(--text)}

/* action buttons */
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.02em;padding:6px 13px;cursor:pointer;transition:all .12s;white-space:nowrap;border-radius:var(--r);border:1px solid var(--b);background:var(--page);color:var(--muted)}
.btn svg{width:12px;height:12px;flex-shrink:0}
.btn:hover{border-color:var(--K);color:var(--text);background:var(--bg)}
.btn-primary{background:var(--K);color:#fff;border-color:var(--K)}
.btn-primary:hover{background:#3a3f45;border-color:#3a3f45}
.btn-danger:hover{border-color:#e53935;color:#e53935}

/* theme select — same pill style as template hero */
.theme-sel{background:transparent;border:1px solid var(--b);color:var(--muted);font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.02em;padding:4px 8px;border-radius:var(--r);cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .15s}
.theme-sel:hover,.theme-sel:focus{border-color:var(--K);color:var(--text);box-shadow:none!important}

/* ── workspace ── */
#workspace{flex:1;overflow:hidden;position:relative}
#gjs{width:100%;height:100%}

/* ── source panel ── */
#src-panel{position:absolute;inset:0;background:var(--page);z-index:100;display:none;flex-direction:column}
#src-panel.open{display:flex}
#src-bar{height:var(--bar);background:var(--page);border-bottom:3px solid var(--Y);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0}
#src-bar span{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
#cm-wrap{flex:1;overflow:hidden}
#cm-wrap .CodeMirror{height:100%!important;font-family:'Courier New',monospace!important;font-size:13px!important;line-height:1.65!important}

/* ── statusbar ── */
#statusbar{height:26px;background:var(--page);border-top:1px solid var(--b);display:flex;align-items:center;padding:0 14px;gap:16px;flex-shrink:0}
.si{font-size:10px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px;letter-spacing:.02em}
.dot{width:6px;height:6px;border-radius:50%;background:#2E7D32}
.dot.loading{background:var(--muted);animation:pulse 1.1s infinite}
.dot.error{background:#e53935}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ── loading overlay ── */
#overlay{position:absolute;inset:0;background:rgba(250,250,250,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity .3s}
[data-theme="dark"] #overlay{background:rgba(26,26,26,.96)}
#overlay.gone{opacity:0;pointer-events:none}
.spin{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--K);border-radius:50%;animation:spin .65s linear infinite}
[data-theme="dark"] .spin{border-top-color:var(--Y)}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-txt{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.ov-badge{background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.4);color:var(--K);font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}

/* ── error box — same as .ib style in template ── */
#err{display:none;margin:12px;padding:12px 16px;background:#FFEBEE;border-left:4px solid #e53935;border-radius:0 var(--r) var(--r) 0;font-size:12px;font-weight:600;color:#c62828;line-height:1.7}
#err.show{display:block}

/* ── toast — green, matches template accent ── */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--Y);color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.02em;padding:8px 20px;border-radius:20px;opacity:0;transition:all .2s;pointer-events:none;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.15)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── GrapesJS overrides — CDNWebTemplate palette ── */
.gjs-one-bg{background-color:var(--page)!important}
.gjs-two-bg{background-color:var(--bg)!important}
.gjs-three-bg{background-color:var(--b)!important}
.gjs-four-color,.gjs-four-color-h:hover{color:var(--text)!important}
.gjs-pn-btn{color:var(--muted)!important}
.gjs-pn-btn.gjs-pn-active,.gjs-pn-btn:hover{color:var(--text)!important}
.gjs-block{border-color:var(--b)!important;background:var(--page)!important}
.gjs-block:hover{border-color:var(--K)!important;background:var(--bg)!important}
.gjs-block__label{color:var(--muted)!important;font-family:var(--sans)!important;font-size:11px!important}
.gjs-selected{outline:2px solid var(--Y)!important;outline-offset:1px!important}
.gjs-hovered{outline:1px dashed rgba(76,175,80,.6)!important}
.gjs-toolbar{background:var(--K)!important}
.gjs-toolbar-item{color:#fff!important}
.gjs-toolbar-item:hover{color:var(--Y)!important}
.gjs-sm-title,.gjs-trt-title{background:var(--K)!important;color:#fff!important;font-family:var(--sans)!important;font-size:11px!important;text-transform:uppercase!important;letter-spacing:.5px!important}
.gjs-field{border-color:var(--b)!important;border-radius:var(--r)!important}
.gjs-field:focus-within{border-color:var(--K)!important}
</style>
</head>
<body>

<div id="topbar">
  <span class="brand"><span class="brand-dot">C</span>Document Editor</span>
  <div class="sep"></div>
  <label class="btn" style="cursor:pointer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Open file
    <input id="fpicker" type="file" accept=".html" style="display:none" onchange="loadFromFile(this)"/>
  </label>
  <span id="fname" class="file-in" style="cursor:default;color:var(--muted);font-style:italic">no file selected</span>
  <div class="sep"></div>
  <div class="tog" id="dev">
    <button class="on" onclick="setDev('Desktop',this)">Desktop</button>
    <button onclick="setDev('Tablet',this)">Tablet</button>
    <button onclick="setDev('Mobile',this)">Mobile</button>
  </div>
  <div class="sep"></div>
  <div class="tog" id="mode">
    <button class="on" onclick="setMode('visual')">Visual</button>
    <button onclick="setMode('source')">Source</button>
  </div>
  <div class="spacer"></div>
  <select class="theme-sel" @change="dk=$event.target.value==='dark'">
    <option value="light">☀ Light</option>
    <option value="dark">◑ Dark</option>
  </select>
  <div class="sep"></div>
  <button class="btn btn-danger" onclick="clearCanvas()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    Clear
  </button>
  <button class="btn btn-primary" onclick="downloadFile()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </button>
</div>

<div id="workspace">
  <div id="overlay">
    <div class="spin"></div>
    <span class="ov-txt" id="ov-msg">Open an HTML file to get started</span>
    <span class="ov-badge">CDNWebTemplate · Editor</span>
    <p style="font-size:12px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6">Use the <strong>Open file</strong> button in the top bar to load a local HTML file</p>
  </div>
  <div id="err"></div>
  <div id="gjs"></div>
  <div id="src-panel">
    <div id="src-bar">
      <span>HTML Source Code</span>
      <div class="spacer"></div>
      <button class="btn" onclick="applySource()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Apply
      </button>
      <button class="btn" onclick="setMode('visual')">✕ Close</button>
    </div>
    <div id="cm-wrap"><textarea id="cm-ta"></textarea></div>
  </div>
</div>

<div id="statusbar">
  <div class="si"><div class="dot" id="dot"></div><span id="stxt">Ready</span></div>
  <div class="si">Drag blocks from the left panel</div>
  <div class="si">Select element → styles in the right panel</div>
  <div class="si" id="sel-info"></div>
</div>

<div id="toast"></div>

<script>
let editor=null, cm=null;

function initCM(){
  if(cm) return;
  cm=CodeMirror.fromTextArea(document.getElementById('cm-ta'),{
    mode:'htmlmixed',theme:'eclipse',lineNumbers:true,
    lineWrapping:false,autoCloseTags:true,tabSize:2,indentWithTabs:false
  });
}

function initEditor(fullHtml){
  if(editor){editor.destroy();editor=null;}
  const bm=fullHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  const body=bm?bm[1]:fullHtml;
  const css=[...fullHtml.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/gi)].map(m=>m[1]).join('\n');
  editor=grapesjs.init({
    container:'#gjs',height:'100%',width:'100%',
    fromElement:false,components:body,style:css,
    storageManager:false,
    plugins:['gjs-preset-webpage'],
    pluginsOpts:{'gjs-preset-webpage':{blocks:['link-block','quote','text-basic']}},
    deviceManager:{devices:[
      {name:'Desktop',width:''},
      {name:'Tablet',width:'768px',widthMedia:'992px'},
      {name:'Mobile',width:'375px',widthMedia:'768px'}
    ]}
  });
  editor.on('component:selected',c=>{
    const tag=c?.get('tagName')||'',id=c?.get('attributes')?.id||'';
    document.getElementById('sel-info').textContent=tag?`<${tag}${id?'#'+id:''}>`:'' ;
  });
  editor.on('component:deselected',()=>{document.getElementById('sel-info').textContent=''});
  editor.on('load',()=>{hideOverlay();setStatus('ok','Ready')});
  editor.on('change:changesCount',()=>setStatus('ok','Unsaved changes'));
}

function loadFromFile(input){
  const file=input.files[0];
  if(!file) return;
  const lbl=document.getElementById('fname');
  lbl.textContent=file.name;lbl.style.fontStyle='normal';lbl.style.color='var(--text)';
  showOverlay('Loading '+file.name+'...');setStatus('load','Reading...');hideErr();
  const fr=new FileReader();
  fr.onload=e=>{try{initEditor(e.target.result);}catch(err){hideOverlay();showErr(err.message);setStatus('err','Failed to load')}};
  fr.onerror=()=>{hideOverlay();showErr('Error reading the file.');setStatus('err','Error')};
  fr.readAsText(file);
}

function setMode(m){
  document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',b.textContent.trim()===(m==='source'?'Source':'Visual')));
  const p=document.getElementById('src-panel');
  if(m==='source'){
    if(!editor){toast('Load a template first');return;}
    initCM();cm.setValue(buildFull());p.classList.add('open');
    setTimeout(()=>cm.refresh(),50);
  } else { p.classList.remove('open') }
}

function applySource(){
  if(!cm||!editor) return;
  const bm=cm.getValue().match(/<body[^>]*>([\s\S]*?)<\/body>/i);
  editor.setComponents(bm?bm[1]:cm.getValue());
  toast('Source applied');setMode('visual');
}

function buildFull(){
  if(!editor) return '';
  return `<!DOCTYPE html>
<html lang="en" x-data="{dk:false}" :data-theme="dk?'dark':'light'">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Document – CDNWebTemplate</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap"/>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({startOnLoad:true,theme:'base',themeVariables:{
  primaryColor:'#4CAF50',primaryTextColor:'#ffffff',primaryBorderColor:'#23282d',
  lineColor:'#23282d',fontFamily:"'Open Sans',sans-serif",fontSize:'13px',
  taskBkgColor:'#4CAF50',taskBorderColor:'#23282d',taskTextColor:'#ffffff',
  critBkgColor:'#23282d',critBorderColor:'#23282d',critTextColor:'#4CAF50',
  todayLineColor:'#4CAF50',sectionBkgColor:'#F5F5F5',altSectionBkgColor:'#FAFAFA',gridColor:'#E0E0E0'
}});
<\/script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"><\/script>
<style>
${editor.getCss()}
</style>
</head>
<body>
${editor.getHtml()}
</body>
</html>`;
}

function downloadFile(){
  if(!editor){toast('No template loaded');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([buildFull()],{type:'text/html'}));
  a.download=(document.getElementById('fname').textContent.replace(/\.html$/i,'').replace('no file selected','')||'document')+'-edited.html';
  a.click();URL.revokeObjectURL(a.href);
  toast('Download complete ✓');setStatus('ok','Downloaded');
}

function setDev(name,btn){
  if(!editor) return;
  editor.setDevice(name);
  document.querySelectorAll('#dev button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function clearCanvas(){
  if(!editor) return;
  if(confirm('Clear canvas? This action cannot be undone.')){
    editor.setComponents('');editor.setStyle('');toast('Canvas cleared');
  }
}

function showOverlay(m){document.getElementById('ov-msg').textContent=m;document.getElementById('overlay').classList.remove('gone')}
function hideOverlay(){document.getElementById('overlay').classList.add('gone')}
function showErr(m){const e=document.getElementById('err');e.textContent='⚠ '+m;e.classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}
function setStatus(t,tx){
  document.getElementById('stxt').textContent=tx;
  const d=document.getElementById('dot');
  d.className='dot'+(t==='load'?' loading':t==='err'?' error':'');
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2300);
}

// Open an HTML file using the 'Open file' button in the toolbar
</script>
</body>
</html>
